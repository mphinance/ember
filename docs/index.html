<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WheelForge — premium to sell, toward free shares</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Archivo:wght@600;800&display=swap">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="wf-top">
    <div class="wf-brand"><span class="wf-spark"></span>WheelForge</div>
    <div class="wf-tag">premium to sell, toward free shares</div>
    <a href="https://github.com/mphinance/ember/blob/master/pine/wheelforge_put_zone.pine" style="margin-left:auto;color:#22d3ee;text-decoration:none;font-size:12px;letter-spacing:.06em">Pine indicator →</a>
    <a href="./live.html" style="color:#39ff8a;text-decoration:none;font-size:12px;letter-spacing:.06em">● watch her build →</a>
    <div class="wf-meta" id="wf-meta" style="margin-left:0"></div>
  </header>

  <div class="wf-liverate" id="wf-liverate"></div>
  <div class="wf-regime" id="wf-regime"></div>
  <div class="wf-changes" id="wf-changes"></div>
  <div class="wf-record" id="wf-record"></div>

  <details class="wf-how" id="wf-how">
    <summary>how scoring works</summary>
    <div class="wf-how-body" id="wf-how-body"></div>
  </details>

  <main class="wf-main">
    <aside class="wf-list">
      <div class="wf-controls" id="wf-controls"></div>
      <div class="wf-prime" id="wf-prime"></div>
      <div id="wf-cards"></div>
    </aside>
    <section class="wf-stage">
      <div class="wf-readout" id="wf-readout"></div>
      <div id="wf-chart"></div>
    </section>
  </main>

  <footer class="wf-foot" id="wf-foot"></footer>

  <script src="./vendor/klinecharts/klinecharts.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
